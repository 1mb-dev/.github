name: Secret Scan

on:
  workflow_call:
    inputs:
      gitleaks-version:
        description: "Gitleaks binary version"
        type: string
        default: "8.30.1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install and run gitleaks
        env:
          VERSION: ${{ inputs.gitleaks-version }}
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
